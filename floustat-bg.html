<!--
  ФЛОУСТАТ — WebGL Background для Tilda
  Инструкция:
  1. Вставь блок «HTML» (раздел «Другое») самым первым на странице
  2. В настройках блока поставь высоту 0px и сними галку «Отступы»
  3. В настройках СЕКЦИИ поставь фон: прозрачный (transparent / none)
-->
<style>
  #fs-canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }
  #fs-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.30);
    z-index: 1;
    pointer-events: none;
  }
  #fs-grain {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 2;
    pointer-events: none;
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
</style>

<canvas id="fs-canvas"></canvas>
<div id="fs-overlay"></div>
<div id="fs-grain"></div>

<script>
(function () {
  'use strict';

  var canvas = document.getElementById('fs-canvas');
  var gl = canvas.getContext('webgl', { antialias: false, alpha: false })
         || canvas.getContext('experimental-webgl', { antialias: false, alpha: false });
  if (!gl) return;

  // ── OES_texture_float обязателен для ChromaFlow ──
  var floatExt = gl.getExtension('OES_texture_float');
  gl.getExtension('OES_texture_float_linear');
  if (!floatExt) {
    console.warn('OES_texture_float not supported — ChromaFlow disabled');
  }

  var W = 1, H = 1;
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W);
    canvas.height = Math.floor(H);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);

  // ────────────────────────────────────────────────────────────────
  // VERTEX SHADER
  // ────────────────────────────────────────────────────────────────
  var VS = [
    'attribute vec2 a;',
    'varying vec2 vUv;',
    'void main(){',
    '  vUv = a * 0.5 + 0.5;',
    '  gl_Position = vec4(a, 0.0, 1.0);',
    '}'
  ].join('\n');

  // ────────────────────────────────────────────────────────────────
  // FRAGMENT SHADER
  // u_disp — RG32F 128×128: displacement vectors (x,y)
  // u_liq  — RG32F 128×128: liquid density in .r
  // ────────────────────────────────────────────────────────────────
  var FS = [
    'precision highp float;',
    'varying vec2 vUv;',
    'uniform float u_t;',
    'uniform sampler2D u_disp;',   // displacement field
    'uniform sampler2D u_liq;',    // liquid density

    // ── SWIRL — точная копия shaders/react <Swirl> ──
    // три частоты, distortion через sin/cos, shimmer
    'vec3 swirl(vec2 uv, float t){',
    '  float d = 0.6;',            // detail=0.6

    // freq1 = detail
    '  float f1=d;',
    '  vec2 d1=vec2(',
    '    uv.x+sin(uv.y*f1*1.7+t*0.8)*0.12+cos(uv.x*f1*0.9-t*0.5)*0.05,',
    '    uv.y+cos(uv.x*f1*1.3-t*0.6)*0.12+sin(uv.y*f1*1.1+t*0.7)*0.05);',
    '  float p1=sin(d1.x*f1*2.1+d1.y*f1*1.8+t*0.4);',

    // freq2 = detail*2.1
    '  float f2=d*2.1;',
    '  vec2 d2=vec2(',
    '    uv.x+sin(uv.y*f2*1.4-t*0.7)*0.08+cos(uv.x*f2*1.1+t*0.4)*0.04,',
    '    uv.y+cos(uv.x*f2*1.6+t*0.5)*0.08+sin(uv.y*f2*0.9-t*0.6)*0.04);',
    '  float p2=cos(d2.x*f2*1.8+d2.y*f2*2.1-t*0.3);',

    // freq3 = detail*3.7
    '  float f3=d*3.7;',
    '  vec2 d3=vec2(',
    '    uv.x+sin(uv.y*f3*1.2+t*0.9)*0.05+cos(uv.x*f3*1.4-t*0.3)*0.03,',
    '    uv.y+cos(uv.x*f3*1.8-t*0.8)*0.05+sin(uv.y*f3*1.3+t*0.5)*0.03);',
    '  float p3=sin(d3.x*f3*2.3+d3.y*f3*1.6+t*0.5);',

    '  float combined=p1*0.45+p2*0.35+p3*0.20;',
    // blend=60 → blendBias=(60-50)*0.006=0.06
    '  float bf=smoothstep(0.3,0.7,combined*0.5+0.5+0.06);',
    // colorA=#1a4fd6  colorB=#3b82f6
    '  vec3 cA=vec3(0.102,0.310,0.839);',
    '  vec3 cB=vec3(0.231,0.510,0.965);',
    '  vec3 col=mix(cA,cB,bf);',
    // shimmer: sin(t*2.5+pattern*8)*0.015+1
    '  return col*(sin(t*2.5+combined*8.0)*0.015+1.0);',
    '}',

    // ── CHROMAFLOW — точная копия логики шейдерной части ──
    // liquidDensity из u_liq, flowVectors из u_disp
    // оба усредняются по 5 сэмплам (center + 4 neighbours)
    'void main(){',
    '  float px=1.0/128.0;',

    // liquid density — smoothedLiquid = avg(center, +x, +y, -x, -y) * 0.2
    '  float ld =texture2D(u_liq, vUv              ).r;',
    '  float ld1=texture2D(u_liq, vUv+vec2( px,0.) ).r;',
    '  float ld2=texture2D(u_liq, vUv+vec2(0., px) ).r;',
    '  float ld3=texture2D(u_liq, vUv+vec2(-px,0.) ).r;',
    '  float ld4=texture2D(u_liq, vUv+vec2(0.,-px) ).r;',
    '  float smoothLiq=(ld+ld1+ld2+ld3+ld4)*0.2;',
    '  float liquidIntensity=smoothstep(0.0,0.1,smoothLiq);',

    // displacement flowVectors = avg(center, +x, +y, -x, -y) * 0.2
    '  vec2 fv =texture2D(u_disp, vUv              ).rg;',
    '  vec2 fv1=texture2D(u_disp, vUv+vec2( px,0.) ).rg;',
    '  vec2 fv2=texture2D(u_disp, vUv+vec2(0., px) ).rg;',
    '  vec2 fv3=texture2D(u_disp, vUv+vec2(-px,0.) ).rg;',
    '  vec2 fv4=texture2D(u_disp, vUv+vec2(0.,-px) ).rg;',
    '  vec2 flow=(fv+fv1+fv2+fv3+fv4)*0.2;',

    // flowMagnitude, hasFlow, normalized direction
    '  float mag=sqrt(flow.x*flow.x+flow.y*flow.y);',
    '  float hasFlow=smoothstep(0.01,0.1,mag);',
    '  float nx=flow.x/(mag+0.001);',
    '  float ny=flow.y/(mag+0.001);',

    // directional amounts
    '  float rAmt=smoothstep(0.0,0.7,max( nx,0.0));',
    '  float lAmt=smoothstep(0.0,0.7,max(-nx,0.0));',
    '  float uAmt=smoothstep(0.0,0.7,max( ny,0.0));',
    '  float dAmt=smoothstep(0.0,0.7,max(-ny,0.0));',

    // base=#1e40af  up=#3b82f6  down=#1e3a5f  left=#0f2d5e  right=#2563eb
    '  vec3 base =vec3(0.118,0.251,0.686);',
    '  vec3 cup  =vec3(0.231,0.510,0.965);',
    '  vec3 cdown=vec3(0.118,0.227,0.373);',
    '  vec3 cleft=vec3(0.059,0.176,0.369);',
    '  vec3 cright=vec3(0.145,0.388,0.922);',

    '  float hw=lAmt+rAmt;',
    '  float vw=uAmt+dAmt;',
    '  float tw=hw+vw+0.001;',
    '  vec3 hCol=cleft*lAmt+cright*rAmt;',
    '  vec3 vCol=cdown*dAmt+cup*uAmt;',
    '  vec3 dirCol=hCol*(hw/tw)+vCol*(vw/tw);',
    '  vec3 cfCol=mix(base,dirCol,hasFlow);',

    // finalColor = cfCol * liquidIntensity (как в пакете: rgb*liqInt, a*liqInt)
    // opacity=0.96: mix(swirl, cfCol, liquidIntensity*0.96)
    '  vec3 s=swirl(vUv,u_t);',
    '  vec3 col=mix(s, cfCol, liquidIntensity*0.96);',
    '  gl_FragColor=vec4(col,1.0);',
    '}'
  ].join('\n');

  function mkShader(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      console.error('Shader:', gl.getShaderInfoLog(s));
    return s;
  }
  var prog = gl.createProgram();
  gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  var vBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  var aLoc = gl.getAttribLocation(prog, 'a');
  gl.enableVertexAttribArray(aLoc);
  gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

  var uT    = gl.getUniformLocation(prog, 'u_t');
  var uDisp = gl.getUniformLocation(prog, 'u_disp');
  var uLiq  = gl.getUniformLocation(prog, 'u_liq');

  // ── Создаём две RG32F текстуры 128×128 ──
  var GRID = 128;
  var N    = GRID * GRID;

  function makeTex() {
    var t2 = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t2);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    // RG → используем LUMINANCE_ALPHA (r=.r, g=.a в WebGL1)
    // Но шейдер читает .r и .rg — поэтому используем RGBA float
    if (floatExt) {
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, GRID, GRID, 0,
                    gl.RGBA, gl.FLOAT, new Float32Array(N * 4));
    } else {
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, GRID, GRID, 0,
                    gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array(N * 4));
    }
    return t2;
  }

  var dispTex = makeTex();
  var liqTex  = makeTex();

  // ── CPU-данные (точно как в пакете) ──
  var dispData     = new Float32Array(N * 2);  // [dx, dy] per cell
  var liqData      = new Float32Array(N * 2);  // [density, 0] per cell
  var tmpDisp      = new Float32Array(N * 2);
  var tmpLiq       = new Float32Array(N * 2);

  // буферы для загрузки в текстуры (RGBA)
  var dispBuf = floatExt ? new Float32Array(N * 4) : new Uint8Array(N * 4);
  var liqBuf  = floatExt ? new Float32Array(N * 4) : new Uint8Array(N * 4);

  function uploadTex(tex, buf, data, isDisp) {
    for (var i = 0; i < N; i++) {
      var v0 = data[i * 2];      // x (или density)
      var v1 = data[i * 2 + 1]; // y
      if (floatExt) {
        buf[i*4]   = v0;
        buf[i*4+1] = v1;
        buf[i*4+2] = 0;
        buf[i*4+3] = 1;
      } else {
        // pack: displacement [-1..1]→[0..255], density [0..1]→[0..255]
        if (isDisp) {
          buf[i*4]   = Math.round((v0 * 0.5 + 0.5) * 255);
          buf[i*4+1] = Math.round((v1 * 0.5 + 0.5) * 255);
        } else {
          buf[i*4]   = Math.round(Math.min(1, Math.max(0, v0)) * 255);
          buf[i*4+1] = 0;
        }
        buf[i*4+2] = 0;
        buf[i*4+3] = 255;
      }
    }
    gl.bindTexture(gl.TEXTURE_2D, tex);
    if (floatExt) {
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, GRID, GRID, 0, gl.RGBA, gl.FLOAT, buf);
    } else {
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, GRID, GRID, 0, gl.RGBA, gl.UNSIGNED_BYTE, buf);
    }
  }

  // ── Мышь ──
  var ptrX = 0.5, ptrY = 0.5;
  var prevX = 0.5, prevY = 0.5;
  var velX = 0, velY = 0;        // сглаженная скорость (как в пакете)
  var lastMouseTime = Date.now();

  window.addEventListener('mousemove', function(e) {
    ptrX =       e.clientX / window.innerWidth;
    ptrY = 1.0 - e.clientY / window.innerHeight; // инверт Y: UV 0=низ, экран 0=верх
  });

  // ────────────────────────────────────────────────────────────────
  // CPU SIMULATION — точная копия onBeforeRender из ChromaFlow пакета
  // ────────────────────────────────────────────────────────────────
  function simulate() {
    var currentTime = Date.now();
    // dt = min((now - last) / 1000, 0.016) — точно как в пакете
    var dt = Math.min((currentTime - lastMouseTime) / 1000, 0.016);
    lastMouseTime = currentTime;

    // скорость мыши: velX = velX*0.85 + raw*0.15 — точно как в пакете
    var rawVX = dt > 0 ? (ptrX - prevX) / dt : 0;
    var rawVY = dt > 0 ? (ptrY - prevY) / dt : 0;
    velX = velX * 0.85 + rawVX * 0.15;
    velY = velY * 0.85 + rawVY * 0.15;

    // параметры: intensity=0.85, radius=1.6*0.05=0.08, momentum=20
    var intensity = 0.85;
    var radius    = 1.6 * 0.05;
    var momentum  = 20;

    // скорость мыши (magnitude)
    var speed = Math.sqrt(velX * velX + velY * velY);

    // 1. Затухание displacement: flowFadeRate = 1 - dt/max(0.1,1)
    var flowFade = 1 - dt / Math.max(0.1, 1);
    for (var k = 0; k < N * 2; k++) tmpDisp[k] = dispData[k] * flowFade;

    // liquidFadeRate = 1 - dt/max(0.4,1)
    var liqFade = 1 - dt / Math.max(0.4, 1);

    // 2. Advection + liquid fade (точно как в пакете)
    for (var i = 0; i < GRID; i++) {
      for (var j = 0; j < GRID; j++) {
        var idx = (i * GRID + j) * 2;

        tmpLiq[idx]     = liqData[idx]     * liqFade;
        tmpLiq[idx + 1] = 0;

        // advection — перенос жидкости по полю скоростей
        if (Math.abs(dispData[idx]) > 0.001 || Math.abs(dispData[idx + 1]) > 0.001) {
          var flowSpeed = momentum * 50 * dt;
          var advectX = j - dispData[idx]     * flowSpeed;
          var advectY = i - dispData[idx + 1] * flowSpeed;
          var x0 = Math.floor(advectX);
          var y0 = Math.floor(advectY);
          var x1 = x0 + 1;
          var y1 = y0 + 1;
          if (x0 >= 0 && y0 >= 0 && x1 < GRID && y1 < GRID) {
            var fx = advectX - x0;
            var fy = advectY - y0;
            var i00 = (y0 * GRID + x0) * 2;
            var i01 = (y0 * GRID + x1) * 2;
            var i10 = (y1 * GRID + x0) * 2;
            var i11 = (y1 * GRID + x1) * 2;
            // bilinear interpolation — точно как в пакете
            tmpLiq[idx] = (
              liqData[i00] * (1 - fx) * (1 - fy) +
              liqData[i01] * fx       * (1 - fy) +
              liqData[i10] * (1 - fx) * fy       +
              liqData[i11] * fx       * fy
            ) * liqFade;
          }
        }
      }
    }

    // 3. Влияние мыши — точно как в пакете
    // effectiveRadius = radius * min(speed²*20, 1)
    var effectiveRadius = radius * Math.min(speed * speed * 20, 1);

    for (var i = 0; i < GRID; i++) {
      for (var j = 0; j < GRID; j++) {
        var idx = (i * GRID + j) * 2;
        // cellX/Y как в пакете: (j+0.5)/GRID, (i+0.5)/GRID
        var cellX = (j + 0.5) / GRID;
        var cellY = (i + 0.5) / GRID;
        var dx = cellX - ptrX;
        var dy = cellY - ptrY;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < effectiveRadius * 2 && (Math.abs(rawVX) + Math.abs(rawVY)) > 0.01) {
          var infl = Math.exp(-dist * dist / (effectiveRadius * effectiveRadius));
          // displacement: += vel * influence * (intensity*100) * dt * 0.01
          tmpDisp[idx]     += velX * infl * (intensity * 100) * dt * 0.01;
          tmpDisp[idx + 1] += velY * infl * (intensity * 100) * dt * 0.01;
          // liquid density: += influence * (intensity*100) * dt * 0.01 * speedMultiplier
          var speedMul = Math.min(speed * 10, 1);
          tmpLiq[idx] += infl * (intensity * 100) * dt * 0.01 * speedMul;
          tmpLiq[idx + 1] = 0;
        }

        // clamp — точно как в пакете
        tmpDisp[idx]     = Math.max(-1, Math.min(1, tmpDisp[idx]));
        tmpDisp[idx + 1] = Math.max(-1, Math.min(1, tmpDisp[idx + 1]));
        tmpLiq[idx]      = Math.max(0,  Math.min(1, tmpLiq[idx]));
        tmpLiq[idx + 1]  = 0;
      }
    }

    dispData.set(tmpDisp);
    liqData.set(tmpLiq);

    prevX = ptrX;
    prevY = ptrY;
  }

  // ── Render loop ──
  var lastNow = performance.now();
  var simTime = 0;

  function frame(now) {
    var dt = Math.min((now - lastNow) * 0.001, 1 / 30);
    lastNow = now;
    simTime += dt * 0.5;  // speed=0.5

    simulate();

    uploadTex(dispTex, dispBuf, dispData, true);
    uploadTex(liqTex,  liqBuf,  liqData,  false);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, dispTex);
    gl.uniform1i(uDisp, 0);

    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, liqTex);
    gl.uniform1i(uLiq, 1);

    gl.uniform1f(uT, simTime);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);

})();
</script>
