<!--
  ФЛОУСТАТ — WebGL Background для Tilda
  Вставь весь код в блок «HTML» на Tilda.
  В настройках блока задай высоту секции (например 100vh).
-->
<style>
  #fs-canvas {
    display: block;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  #fs-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.30);
    z-index: 1;
    pointer-events: none;
  }
  #fs-grain {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
</style>

<canvas id="fs-canvas"></canvas>
<div id="fs-overlay"></div>
<div id="fs-grain"></div>

<script>
(function () {
  'use strict';

  var canvas = document.getElementById('fs-canvas');
  var gl = canvas.getContext('webgl', { antialias: false, alpha: false })
         || canvas.getContext('experimental-webgl', { antialias: false, alpha: false });
  if (!gl) return;

  var W = 1, H = 1;
  function resize() {
    var p = canvas.parentElement;
    W = p.offsetWidth  || window.innerWidth;
    H = p.offsetHeight || window.innerHeight;
    canvas.width  = Math.floor(W);
    canvas.height = Math.floor(H);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);

  var VS = 'attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}';

  var FS = [
  'precision highp float;',
  'uniform float u_t;',
  'uniform vec2  u_r;',
  'uniform vec2  u_m;',    /* сглаженная позиция мыши 0..1          */
  'uniform float u_mom;',  /* сглаженный импульс 0..1, без скачков  */

  /* Simplex 3D noise */
  'vec3 p3(vec3 x){return x-floor(x*(1./289.))*289.;}',
  'vec4 p4(vec4 x){return x-floor(x*(1./289.))*289.;}',
  'vec4 pm(vec4 x){return p4(((x*34.)+1.)*x);}',
  'vec4 ti(vec4 r){return 1.79284291400159-0.85373472095314*r;}',
  'float sn3(vec3 v){',
  '  const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);',
  '  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);',
  '  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;',
  '  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);',
  '  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;',
  '  i=p3(i);',
  '  vec4 pp=pm(pm(pm(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));',
  '  vec3 ns=.142857142857*D.wyz-D.xzx;',
  '  vec4 j=pp-49.*floor(pp*ns.z*ns.z);',
  '  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);',
  '  vec4 xs=x_*ns.x+ns.yyyy;vec4 ys=y_*ns.x+ns.yyyy;',
  '  vec4 h=1.-abs(xs)-abs(ys);',
  '  vec4 b0=vec4(xs.xy,ys.xy);vec4 b1=vec4(xs.zw,ys.zw);',
  '  vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;',
  '  vec4 sh=-step(h,vec4(0.));',
  '  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;',
  '  vec3 q0=vec3(a0.xy,h.x);vec3 q1=vec3(a0.zw,h.y);',
  '  vec3 q2=vec3(a1.xy,h.z);vec3 q3=vec3(a1.zw,h.w);',
  '  vec4 norm=ti(vec4(dot(q0,q0),dot(q1,q1),dot(q2,q2),dot(q3,q3)));',
  '  q0*=norm.x;q1*=norm.y;q2*=norm.z;q3*=norm.w;',
  '  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);',
  '  m=m*m;return 42.*dot(m*m,vec4(dot(q0,x0),dot(q1,x1),dot(q2,x2),dot(q3,x3)));',
  '}',

  /* fBm 5 октав */
  'float fbm(vec3 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*sn3(p);p=p*2.1+vec3(1.7,9.2,3.4);a*=.5;}return v;}',

  /* ChromaFlow: цвет по направлению вектора */
  'vec3 cf(vec2 d){',
  '  vec3 base=vec3(.118,.251,.686);',   /* #1e40af */
  '  vec3 cu  =vec3(.231,.510,.965);',   /* #3b82f6 */
  '  vec3 cd  =vec3(.118,.227,.373);',   /* #1e3a5f */
  '  vec3 cl  =vec3(.059,.176,.369);',   /* #0f2d5e */
  '  vec3 cr  =vec3(.145,.388,.922);',   /* #2563eb */
  '  return base+clamp(d.x,0.,1.)*cu+clamp(-d.x,0.,1.)*cd+clamp(d.y,0.,1.)*cr+clamp(-d.y,0.,1.)*cl;',
  '}',

  'void main(){',
  '  vec2 uv=gl_FragCoord.xy/u_r;',
  '  float ar=u_r.x/u_r.y;',
  '  vec2 p=uv*vec2(ar,1.);',

  /* SWIRL: speed=0.5 — время уже замедлено в JS до ~0.016/кадр */
  '  float n1=fbm(vec3(p*1.08, u_t));',
  '  float n2=fbm(vec3(p*0.81+vec2(n1*.6,n1*.6), u_t*0.7+4.3));',
  '  float sw=clamp(n2*.5+.5,0.,1.);',
  '  vec3 col=mix(vec3(.102,.310,.839),vec3(.231,.510,.965),sw*0.60);',

  /* CHROMAFLOW: radius=1.6 intensity=0.85
     u_mom уже сглажен снаружи — нет скачков → нет мерцания */
  '  vec2 mp=u_m*vec2(ar,1.);',
  '  float dist=length(p-mp);',
  '  float infl=exp(-dist*(1./1.6))*0.85;',
  '  vec2 dir=normalize(p-mp+.0001)*infl*u_mom;',
  '  col=clamp(col+cf(dir)*infl*0.96,0.,1.);',
  '  gl_FragColor=vec4(col,1.);',
  '}',
  ].join('\n');

  function mkShader(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  var prog = gl.createProgram();
  gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  var aLoc = gl.getAttribLocation(prog, 'a');
  gl.enableVertexAttribArray(aLoc);
  gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

  var uT   = gl.getUniformLocation(prog, 'u_t');
  var uR   = gl.getUniformLocation(prog, 'u_r');
  var uM   = gl.getUniformLocation(prog, 'u_m');
  var uMom = gl.getUniformLocation(prog, 'u_mom');

  /* ── Мышь ──
     Два уровня сглаживания, чтобы убрать мерцание:
     1. targetMouse → mouse с lerp 0.05 (как в React-проекте, momentum=20)
     2. mom — сглаженный импульс с lerp 0.06 и затуханием 0.94
        Никаких Math.sqrt(dx*dx+...) — только плавное накопление
  */
  var mouse  = { x: 0.5, y: 0.5 };
  var target = { x: 0.5, y: 0.5 };
  var mom    = 0.0;   /* сглаженный импульс — передаётся в шейдер */
  var rawMom = 0.0;   /* сырой импульс от движения мыши           */

  window.addEventListener('mousemove', function(e) {
    var nx = e.clientX / window.innerWidth;
    var ny = 1.0 - e.clientY / window.innerHeight;
    /* накапливаем сырой импульс как дистанцию перемещения */
    var dx = nx - target.x, dy = ny - target.y;
    rawMom = Math.min(1.0, Math.sqrt(dx*dx + dy*dy) * 8);
    target.x = nx;
    target.y = ny;
  });

  /* ── Время ──
     Считаем dt вручную и ограничиваем 60 fps.
     Умножаем на speed=0.5 — фон движется ТОЧНО как в React.
     Это исключает рывки при потере фокуса/разворачивании вкладки.
  */
  var t       = 0;
  var lastNow = performance.now();

  function frame(now) {
    /* dt в секундах, зажат до 1/30 — нет скачков при смене вкладки */
    var dt = Math.min((now - lastNow) * 0.001, 1/30);
    lastNow = now;

    /* speed = 0.5 */
    t += dt * 0.5;

    /* сглаживание позиции мыши: lerp 0.05 = 1/momentum(20) */
    mouse.x += (target.x - mouse.x) * 0.05;
    mouse.y += (target.y - mouse.y) * 0.05;

    /* двойное сглаживание импульса:
       rawMom → mom с lerp 0.06, затем затухание 0.94
       Это убирает резкие скачки → нет мерцания */
    mom += (rawMom - mom) * 0.06;
    mom *= 0.94;
    rawMom *= 0.85;

    gl.uniform1f(uT,   t);
    gl.uniform2f(uR,   W, H);
    gl.uniform2f(uM,   mouse.x, mouse.y);
    gl.uniform1f(uMom, mom);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);

})();
</script>
