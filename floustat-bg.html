<!-- Флоустат — WebGL Background + Custom Cursor + Grain для Tilda HTML Block -->
<!-- Вставь этот код целиком в блок «HTML» на Tilda -->

<style>
  /* ── Обёртка фона ── */
  #fs-wrap {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }
  #fs-wrap canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  /* Затемнение поверх шейдера */
  #fs-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.28);
    pointer-events: none;
  }

  /* ── Grain ── */
  #fs-grain {
    position: fixed;
    inset: 0;
    z-index: 9998;
    pointer-events: none;
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ── Кастомный курсор ── */
  * { cursor: none !important; }

  #fs-cursor-outer,
  #fs-cursor-inner {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
    will-change: transform;
    contain: layout style paint;
  }
  #fs-cursor-outer .ring {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid #fff;
  }
  #fs-cursor-inner .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #fff;
  }
</style>

<!-- Фон -->
<div id="fs-wrap">
  <canvas id="fs-canvas"></canvas>
  <div id="fs-overlay"></div>
</div>

<!-- Grain -->
<div id="fs-grain"></div>

<!-- Курсор -->
<div id="fs-cursor-outer"><div class="ring"></div></div>
<div id="fs-cursor-inner"><div class="dot"></div></div>

<script>
(function () {

  /* =====================================================
     1. WEBGL SHADER  (Swirl + ChromaFlow in pure GLSL)
     ===================================================== */
  var canvas = document.getElementById('fs-canvas');
  var gl = canvas.getContext('webgl', { antialias: false, alpha: false })
         || canvas.getContext('experimental-webgl', { antialias: false, alpha: false });

  var W, H;
  function resize() {
    var wrap = canvas.parentElement;
    W = wrap.offsetWidth;
    H = wrap.offsetHeight;
    canvas.width  = Math.floor(W);
    canvas.height = Math.floor(H);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);

  /* ---------- вершинный шейдер ---------- */
  var VS = [
    'attribute vec2 a_pos;',
    'void main(){gl_Position=vec4(a_pos,0.,1.);}',
  ].join('\n');

  /* ---------- фрагментный шейдер ---------- */
  var FS = [
  'precision highp float;',
  'uniform float u_time;',
  'uniform vec2  u_res;',
  'uniform vec2  u_mouse;',
  'uniform float u_momentum;',

  /* Simplex 3D */
  'vec3 m289v3(vec3 x){return x-floor(x*(1./289.))*289.;}',
  'vec4 m289v4(vec4 x){return x-floor(x*(1./289.))*289.;}',
  'vec4 perm(vec4 x){return m289v4(((x*34.)+1.)*x);}',
  'vec4 tis(vec4 r){return 1.79284291400159-0.85373472095314*r;}',
  'float sn(vec3 v){',
  '  const vec2 C=vec2(1./6.,1./3.);',
  '  const vec4 D=vec4(0.,.5,1.,2.);',
  '  vec3 i=floor(v+dot(v,C.yyy));',
  '  vec3 x0=v-i+dot(i,C.xxx);',
  '  vec3 g=step(x0.yzx,x0.xyz);',
  '  vec3 l=1.-g;',
  '  vec3 i1=min(g.xyz,l.zxy);',
  '  vec3 i2=max(g.xyz,l.zxy);',
  '  vec3 x1=x0-i1+C.xxx;',
  '  vec3 x2=x0-i2+C.yyy;',
  '  vec3 x3=x0-D.yyy;',
  '  i=m289v3(i);',
  '  vec4 p=perm(perm(perm(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));',
  '  float n_=.142857142857;',
  '  vec3 ns=n_*D.wyz-D.xzx;',
  '  vec4 j=p-49.*floor(p*ns.z*ns.z);',
  '  vec4 x_=floor(j*ns.z);',
  '  vec4 y_=floor(j-7.*x_);',
  '  vec4 x=x_*ns.x+ns.yyyy;',
  '  vec4 y=y_*ns.x+ns.yyyy;',
  '  vec4 h=1.-abs(x)-abs(y);',
  '  vec4 b0=vec4(x.xy,y.xy);',
  '  vec4 b1=vec4(x.zw,y.zw);',
  '  vec4 s0=floor(b0)*2.+1.;',
  '  vec4 s1=floor(b1)*2.+1.;',
  '  vec4 sh=-step(h,vec4(0.));',
  '  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;',
  '  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;',
  '  vec3 p0=vec3(a0.xy,h.x);',
  '  vec3 p1=vec3(a0.zw,h.y);',
  '  vec3 p2=vec3(a1.xy,h.z);',
  '  vec3 p3=vec3(a1.zw,h.w);',
  '  vec4 norm=tis(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));',
  '  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;',
  '  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);',
  '  m=m*m;',
  '  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));',
  '}',

  /* fBm — 5 октав, speed=0.5, detail=0.6 */
  'float fbm(vec3 p){',
  '  float v=0.;float a=.5;',
  '  for(int i=0;i<5;i++){v+=a*sn(p);p=p*2.1+vec3(1.7,9.2,3.4);a*=.5;}',
  '  return v;',
  '}',

  /* ChromaFlow direction → color */
  'vec3 chromaCol(vec2 dir){',
  '  vec3 cBase=vec3(.118,.251,.686);',   /* #1e40af */
  '  vec3 cUp  =vec3(.231,.510,.965);',   /* #3b82f6 */
  '  vec3 cDown=vec3(.118,.227,.373);',   /* #1e3a5f */
  '  vec3 cLeft=vec3(.059,.176,.369);',   /* #0f2d5e */
  '  vec3 cRight=vec3(.145,.388,.922);',  /* #2563eb */
  '  return cBase',
  '        +clamp( dir.x,0.,1.)*cUp',
  '        +clamp(-dir.x,0.,1.)*cDown',
  '        +clamp( dir.y,0.,1.)*cRight',
  '        +clamp(-dir.y,0.,1.)*cLeft;',
  '}',

  'void main(){',
  '  vec2 uv=gl_FragCoord.xy/u_res;',
  '  float ar=u_res.x/u_res.y;',
  '  vec2 p=uv*vec2(ar,1.);',
  '  float t=u_time*0.5;',               /* speed=0.5 */

  /* Swirl — blend=60 */
  '  float n1=fbm(vec3(p*1.2,t));',
  '  float n2=fbm(vec3(p*0.9+vec2(n1*.6,n1*.6),t*.7+4.3));',
  '  float sw=n2*.5+.5;',
  '  vec3 colA=vec3(.102,.310,.839);',    /* #1a4fd6 */
  '  vec3 colB=vec3(.231,.510,.965);',    /* #3b82f6 */
  '  vec3 swirlC=mix(colA,colB,sw*.6);', /* blend=60 */

  /* ChromaFlow — intensity=0.85, radius=1.6, momentum=25 */
  '  vec2 mpos=u_mouse*vec2(ar,1.);',
  '  vec2 dv=p-mpos;',
  '  float dist=length(dv);',
  '  float infl=exp(-dist*(1./1.6))*0.85;',
  '  vec2 dir=normalize(dv+.0001)*infl*u_momentum;',
  '  vec3 chroma=chromaCol(dir)*infl;',

  /* Composite opacity=0.97 */
  '  vec3 col=clamp(swirlC+chroma*0.97,0.,1.);',
  '  gl_FragColor=vec4(col,1.);',
  '}',
  ].join('\n');

  function makeShader(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER,
    new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime     = gl.getUniformLocation(prog, 'u_time');
  var uRes      = gl.getUniformLocation(prog, 'u_res');
  var uMouse    = gl.getUniformLocation(prog, 'u_mouse');
  var uMomentum = gl.getUniformLocation(prog, 'u_momentum');

  /* мышь с инерцией — lerp 0.04 = 1/25 (momentum=25) */
  var mouse  = { x: 0.5, y: 0.5 };
  var tgtM   = { x: 0.5, y: 0.5 };
  var mom    = 0;
  var prevM  = { x: 0.5, y: 0.5 };

  document.addEventListener('mousemove', function (e) {
    var nx = e.clientX / window.innerWidth;
    var ny = 1.0 - e.clientY / window.innerHeight;
    var dx = nx - prevM.x, dy = ny - prevM.y;
    mom = Math.min(1.0, Math.sqrt(dx*dx + dy*dy) * 40);
    prevM.x = tgtM.x = nx;
    prevM.y = tgtM.y = ny;
  });

  var start = performance.now();

  function frame(now) {
    mouse.x += (tgtM.x - mouse.x) * 0.04;
    mouse.y += (tgtM.y - mouse.y) * 0.04;
    mom *= 0.92;

    gl.uniform1f(uTime,     (now - start) * 0.001);
    gl.uniform2f(uRes,      W, H);
    gl.uniform2f(uMouse,    mouse.x, mouse.y);
    gl.uniform1f(uMomentum, mom);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);


  /* =====================================================
     2. CUSTOM CURSOR  — точь-в-точь как в шаблоне
        outer: 16×16 border circle, mix-blend-mode:difference
        inner:  8×8 filled dot,    mix-blend-mode:difference
        lerp factor: 0.15
     ===================================================== */
  var outer = document.getElementById('fs-cursor-outer');
  var inner = document.getElementById('fs-cursor-inner');
  var cur   = { x: 0, y: 0 };
  var tgtC  = { x: 0, y: 0 };
  var isPtr = false;

  function lerpN(a, b, f) { return a + (b - a) * f; }

  function animCursor() {
    cur.x = lerpN(cur.x, tgtC.x, 0.15);
    cur.y = lerpN(cur.y, tgtC.y, 0.15);

    var scale  = isPtr ? 1.5 : 1;
    var scaleI = isPtr ? 0.5 : 1;
    var tfm = 'translate3d(' + cur.x + 'px,' + cur.y + 'px,0) translate(-50%,-50%) scale(';

    outer.style.transform = tfm + scale  + ')';
    inner.style.transform = tfm + scaleI + ')';
    requestAnimationFrame(animCursor);
  }

  document.addEventListener('mousemove', function (e) {
    tgtC.x = e.clientX;
    tgtC.y = e.clientY;
    var el = e.target;
    isPtr  = window.getComputedStyle(el).cursor === 'pointer'
          || el.tagName === 'BUTTON'
          || el.tagName === 'A';
  });

  animCursor();

})();
</script>
