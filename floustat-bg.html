<!-- Флоустат — Animated WebGL Background for Tilda HTML Block -->
<!-- Вставь этот код в блок «HTML» на Tilda. -->
<!-- Размер блока задаётся через настройки блока в Tilda (высота секции). -->

<style>
  #floustat-canvas-wrap {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }

  #floustat-canvas-wrap canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Overlay поверх холста — затемнение для читаемости текста */
  #floustat-canvas-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(10, 18, 40, 0.35);
    pointer-events: none;
  }
</style>

<div id="floustat-canvas-wrap">
  <canvas id="floustat-bg"></canvas>
</div>

<script>
(function () {
  var canvas = document.getElementById('floustat-bg');
  var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;

  var W, H;

  function resize() {
    var wrap = canvas.parentElement;
    W = wrap.offsetWidth;
    H = wrap.offsetHeight;
    canvas.width = W;
    canvas.height = H;
    gl.viewport(0, 0, W, H);
  }

  window.addEventListener('resize', resize);

  var vert = `
    attribute vec2 a_pos;
    void main() {
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;

  var frag = `
    precision highp float;
    uniform float u_time;
    uniform vec2  u_res;
    uniform vec2  u_mouse;

    // ---------- noise helpers ----------
    vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
    vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
    vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
    vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }

    float snoise(vec3 v) {
      const vec2 C = vec2(1.0/6.0, 1.0/3.0);
      const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i  = floor(v + dot(v, C.yyy));
      vec3 x0 = v - i + dot(i, C.xxx);
      vec3 g  = step(x0.yzx, x0.xyz);
      vec3 l  = 1.0 - g;
      vec3 i1 = min(g.xyz, l.zxy);
      vec3 i2 = max(g.xyz, l.zxy);
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy;
      vec3 x3 = x0 - D.yyy;
      i = mod289(i);
      vec4 p = permute(permute(permute(
                i.z + vec4(0.0, i1.z, i2.z, 1.0))
              + i.y + vec4(0.0, i1.y, i2.y, 1.0))
              + i.x + vec4(0.0, i1.x, i2.x, 1.0));
      float n_ = 0.142857142857;
      vec3 ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_);
      vec4 x = x_ *ns.x + ns.yyyy;
      vec4 y = y_ *ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4(x.xy, y.xy);
      vec4 b1 = vec4(x.zw, y.zw);
      vec4 s0 = floor(b0)*2.0 + 1.0;
      vec4 s1 = floor(b1)*2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
      vec3 p0 = vec3(a0.xy, h.x);
      vec3 p1 = vec3(a0.zw, h.y);
      vec3 p2 = vec3(a1.xy, h.z);
      vec3 p3 = vec3(a1.zw, h.w);
      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
      p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m * m;
      return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
    }

    // ---------- fbm ----------
    float fbm(vec3 p) {
      float v = 0.0;
      float a = 0.5;
      for (int i = 0; i < 5; i++) {
        v += a * snoise(p);
        p  = p * 2.1 + vec3(1.7, 9.2, 3.4);
        a *= 0.5;
      }
      return v;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float aspect = u_res.x / u_res.y;
      vec2 p = uv * vec2(aspect, 1.0);

      float t  = u_time * 0.28;

      // mouse influence — мягкое смещение шума под курсором
      vec2 m = u_mouse * vec2(aspect, 1.0);
      float mdist = length(p - m);
      float mfactor = exp(-mdist * 2.2) * 0.18;

      // два слоя шума для swirl-эффекта
      float n1 = fbm(vec3(p * 1.8 + vec2(mfactor * 0.6, 0.0), t));
      float n2 = fbm(vec3(p * 1.4 + vec2(n1 * 0.55, n1 * 0.55), t * 0.7 + 4.3));

      float blend = clamp(n2 * 0.5 + 0.5 + mfactor, 0.0, 1.0);

      // ---- палитра Флоустат (синяя гамма) ----
      vec3 colA = vec3(0.102, 0.310, 0.839); // #1a4fd6  — ярко-синий
      vec3 colB = vec3(0.118, 0.251, 0.686); // #1e40af  — тёмно-синий
      vec3 colC = vec3(0.059, 0.176, 0.369); // #0f2d5e  — очень тёмный синий
      vec3 colD = vec3(0.231, 0.510, 0.965); // #3b82f6  — светло-синий

      // трёхцветный градиент
      vec3 col = mix(colC, colA, blend);
      col = mix(col, colD, clamp(n1 * 0.4 + uv.x * 0.3, 0.0, 1.0));
      col = mix(col, colB, uv.y * 0.5);

      // лёгкое виньетирование по краям
      float vig = 1.0 - length((uv - 0.5) * 1.3);
      vig = clamp(vig, 0.0, 1.0);
      col *= 0.7 + vig * 0.5;

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime  = gl.getUniformLocation(prog, 'u_time');
  var uRes   = gl.getUniformLocation(prog, 'u_res');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');

  var mouse = { x: 0.5, y: 0.5 };
  var targetMouse = { x: 0.5, y: 0.5 };

  document.addEventListener('mousemove', function (e) {
    targetMouse.x = e.clientX / window.innerWidth;
    targetMouse.y = 1.0 - e.clientY / window.innerHeight;
  });

  var start = performance.now();

  function frame(now) {
    // плавный инерционный курсор
    mouse.x += (targetMouse.x - mouse.x) * 0.04;
    mouse.y += (targetMouse.y - mouse.y) * 0.04;

    gl.uniform1f(uTime,  (now - start) * 0.001);
    gl.uniform2f(uRes,   W, H);
    gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);
})();
</script>
